# ----- General settings -----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-features ",xterm-256color:usstyle"

# Undercurl support (for neovim diagnostics in kitty)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable passthrough for kitty graphics protocol (images in neovim/fzf)
set -g allow-passthrough on
set -ga update-environment TERM_PROGRAM

# Extended keys - passes Shift+Enter, Ctrl+; etc. through to apps (needed for Claude Code)
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g status-interval 5

# ----- Prefix key -----
# Use Ctrl-a instead of Ctrl-b (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- Vim-style pane splitting -----
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows keep current path
bind c new-window -c "#{pane_current_path}"

# ----- Seamless vim/tmux navigation (vim-tmux-navigator) -----
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ----- Vim-style copy mode -----
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ----- Pane resizing with vim keys -----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----- Window navigation -----
bind -r n next-window
bind -r p previous-window

# ----- Quick reload -----
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ----- Status bar (Tokyo Night themed) -----
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#545c7e]%H:%M "
set -g status-left-length 30
setw -g window-status-current-format "#[fg=#9ece6a,bold] #I:#W "
setw -g window-status-format " #[fg=#545c7e]#I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
