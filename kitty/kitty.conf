# ===================================================================
# Kitty Configuration
# Optimized for: tmux + neovim + vim keybindings + Claude Code
# ===================================================================

# ----- Font -----
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Tweak font rendering
text_composition_strategy platform

# ----- Cursor -----
cursor_shape          block
cursor_blink_interval 0
shell_integration     no-cursor

# ----- Scrollback -----
# Keep large scrollback for Claude Code output; tmux has its own scrollback
scrollback_lines              10000
scrollback_pager_history_size 100

# ----- Mouse -----
mouse_hide_wait       3.0
copy_on_select        clipboard
mouse_map left click ungrabbed mouse_handle_click selection link prompt

# URLs
url_style        curly
open_url_with    default
detect_urls      yes

# ----- Performance -----
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ----- Bell -----
enable_audio_bell    no
visual_bell_duration 0.0
bell_on_tab          "🔔 "

# ----- Window -----
remember_window_size  yes
initial_window_width  120c
initial_window_height 40c
window_padding_width  0 4 4 4
placement_strategy    center
hide_window_decorations no
confirm_os_window_close 0

# ----- Tab bar -----
# Minimal tab bar - tmux handles most of this
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_title_template  " {index}: {title} "

# ----- macOS specific -----
macos_option_as_alt        yes
macos_quit_graphically     yes
# macos_titlebar_color       background
macos_thicken_font         0.25
macos_traditional_fullscreen no

# ----- Terminal -----
# Use kitty's native TERM for full keyboard protocol support.
# kitten ssh handles terminfo on remotes; tmux handles its own TERM.
term xterm-kitty
shell_integration enabled

# Allow programs (neovim, tmux, claude) to read/write clipboard without prompting
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ----- Keyboard shortcuts -----
# Philosophy: Use Cmd (super) for kitty-level actions.
# Keep Ctrl keys FREE for vim-tmux-navigator (C-h/j/k/l)
# and tmux prefix (C-a).

# Clear default kitty shortcuts that conflict
clear_all_shortcuts yes

# -- Clipboard --
map cmd+c        copy_to_clipboard
map cmd+v        paste_from_clipboard

# -- Font size --
map cmd+equal    change_font_size all +1.0
map cmd+minus    change_font_size all -1.0
map cmd+0        change_font_size all 0

# -- Window management (kitty OS windows, not panes) --
map cmd+n        new_os_window_with_cwd
map cmd+shift+n  new_os_window
map cmd+w        close_window
map cmd+shift+w  close_os_window

# -- Tabs (for when not using tmux) --
map cmd+t           new_tab_with_cwd
map cmd+shift+]     next_tab
map cmd+shift+[     previous_tab
map cmd+1           goto_tab 1
map cmd+2           goto_tab 2
map cmd+3           goto_tab 3
map cmd+4           goto_tab 4
map cmd+5           goto_tab 5
map cmd+6           goto_tab 6
map cmd+7           goto_tab 7
map cmd+8           goto_tab 8
map cmd+9           goto_tab 9

# -- Scrolling (for when outside tmux) --
map cmd+up          scroll_line_up
map cmd+down        scroll_line_down
map cmd+page_up     scroll_page_up
map cmd+page_down   scroll_page_down
map cmd+home        scroll_home
map cmd+end         scroll_end

# -- Search scrollback --
map cmd+f           show_scrollback

# -- Fullscreen --
map cmd+enter       toggle_fullscreen
map cmd+shift+f     toggle_maximized

# -- Config reload --
map cmd+shift+r     load_config_file
map cmd+,           edit_config_file

# -- Misc --
map cmd+q           quit

background_opacity 1.0

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME